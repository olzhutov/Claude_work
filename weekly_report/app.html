<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тижневий звіт — DE COSTA GROUP</title>
<style>
:root {
  --bg:       #0f172a;
  --surface:  #1e293b;
  --card:     #273549;
  --border:   #334155;
  --gold:     #d5b58a;
  --gold-dim: #a8895e;
  --text:     #f1f5f9;
  --muted:    #94a3b8;
  --green:    #22c55e;
  --orange:   #f59e0b;
  --red:      #ef4444;
  --blue:     #3b82f6;
  --radius:   10px;
  --tab-h:    52px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky; top: 0; z-index: 100;
}
.header-brand { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
.header-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; }

/* ── Tabs ────────────────────────────────────────────────────────────── */
.tabs {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  padding: 0 24px;
  gap: 4px;
}
.tab-btn {
  height: var(--tab-h);
  padding: 0 20px;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  color: var(--muted);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: color .15s, border-color .15s;
}
.tab-btn:hover  { color: var(--text); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── Layout ──────────────────────────────────────────────────────────── */
.tab-content { display: none; padding: 24px; max-width: 1100px; margin: 0 auto; }
.tab-content.active { display: block; }

/* ── Week nav ────────────────────────────────────────────────────────── */
.week-nav {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}
.week-nav button {
  width: 36px; height: 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.week-nav button:hover { border-color: var(--gold); color: var(--gold); }
.week-label {
  font-size: 18px; font-weight: 700; color: var(--text);
}
.week-sub { font-size: 12px; color: var(--muted); margin-left: 4px; }
.save-indicator {
  margin-left: auto;
  font-size: 12px;
  color: var(--muted);
  transition: color .3s;
}
.save-indicator.saved { color: var(--green); }

/* ── Actions bar ─────────────────────────────────────────────────────── */
.actions {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.btn {
  padding: 8px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
.btn-primary {
  background: var(--gold);
  border-color: var(--gold);
  color: #0f172a;
}
.btn-primary:hover { background: var(--gold-dim); border-color: var(--gold-dim); }
.btn-ghost {
  background: transparent;
  color: var(--muted);
}
.btn-ghost:hover { color: var(--text); border-color: var(--text); }
.btn-danger {
  background: transparent;
  border-color: var(--red);
  color: var(--red);
}
.btn-danger:hover { background: var(--red); color: #fff; }

/* ── Project card ────────────────────────────────────────────────────── */
.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
}
.project-header {
  display: flex;
  align-items: center;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  gap: 12px;
}
.project-header:hover { background: var(--card); }
.project-chevron {
  color: var(--muted);
  font-size: 12px;
  transition: transform .2s;
  flex-shrink: 0;
}
.project-card.open .project-chevron { transform: rotate(90deg); }
.project-name {
  font-weight: 600;
  font-size: 14px;
  flex: 1;
}
.project-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 600;
  flex-shrink: 0;
}
.badge-green  { background: rgba(34,197,94,.15);  color: var(--green); }
.badge-orange { background: rgba(245,158,11,.15); color: var(--orange); }
.badge-red    { background: rgba(239,68,68,.15);  color: var(--red); }
.badge-empty  { background: var(--card); color: var(--muted); }

.project-body {
  display: none;
  padding: 0 18px 16px;
  border-top: 1px solid var(--border);
}
.project-card.open .project-body { display: block; }

/* ── Task sections ───────────────────────────────────────────────────── */
.section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .8px;
  color: var(--muted);
  text-transform: uppercase;
  margin: 14px 0 8px;
}
.task-row {
  display: flex;
  align-items: flex-start;
  flex-wrap: wrap;
  column-gap: 10px;
  row-gap: 0;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.task-row:last-child { border-bottom: none; }
.task-comment-wrap {
  display: none;
  width: 100%;
  padding: 2px 0 8px 28px;
}
.task-comment-wrap.visible { display: block; }
.task-comment {
  width: 100%;
  background: rgba(213,181,138,.07);
  border: 1px solid rgba(213,181,138,.2);
  border-radius: 6px;
  color: var(--gold-dim);
  font-size: 12px;
  padding: 5px 10px;
  resize: none;
  font-family: inherit;
  outline: none;
  min-height: 28px;
}
.task-comment::placeholder { color: var(--muted); font-style: italic; }
.task-comment:focus { border-color: var(--gold-dim); }
.task-cancel-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 15px;
  padding: 0 4px;
  line-height: 1;
  flex-shrink: 0;
  opacity: 0.45;
}
.task-cancel-btn:hover { color: var(--orange); opacity: 1; }
.task-cancelled-icon {
  color: var(--muted);
  font-size: 13px;
  flex-shrink: 0;
  margin-top: 2px;
  opacity: 0.5;
}
.task-text-cancelled {
  flex: 1;
  font-size: 13px;
  line-height: 1.5;
  color: var(--muted);
  text-decoration: line-through;
  opacity: 0.45;
  font-style: italic;
}
.task-restore-btn {
  background: none;
  border: none;
  color: var(--orange);
  cursor: pointer;
  font-size: 13px;
  padding: 0 4px;
  line-height: 1;
  flex-shrink: 0;
  opacity: 0.7;
}
.task-restore-btn:hover { opacity: 1; }
.task-check {
  width: 18px; height: 18px;
  flex-shrink: 0;
  accent-color: var(--green);
  cursor: pointer;
  margin-top: 2px;
}
.task-text {
  flex: 1;
  font-size: 13px;
  line-height: 1.5;
  background: none;
  border: none;
  color: var(--text);
  resize: none;
  font-family: inherit;
  outline: none;
  padding: 0;
  min-height: 20px;
}
.task-text.done-text { color: var(--muted); text-decoration: line-through; }
.task-text::placeholder { color: var(--muted); }
.task-delete {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  padding: 0 4px;
  line-height: 1;
  flex-shrink: 0;
}
.task-delete:hover { color: var(--red); }
.add-task-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px dashed var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 12px;
  padding: 6px 12px;
  cursor: pointer;
  width: 100%;
  margin-top: 8px;
  transition: all .15s;
}
.add-task-btn:hover { border-color: var(--gold); color: var(--gold); }

/* ── Dashboard ───────────────────────────────────────────────────────── */
.dash-top {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 20px;
  margin-bottom: 24px;
}
.donut-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.donut-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; }
.donut-pct   { font-size: 28px; font-weight: 800; color: var(--gold); margin-top: 10px; }
.donut-sub   { font-size: 12px; color: var(--muted); }

.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 12px;
}
.summary-stat { display: flex; align-items: center; gap: 10px; }
.summary-stat-val { font-size: 22px; font-weight: 700; min-width: 50px; }
.summary-stat-lbl { font-size: 13px; color: var(--muted); }

.proj-list { display: flex; flex-direction: column; gap: 10px; }
.proj-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
}
.proj-row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.proj-row-name { font-size: 14px; font-weight: 600; }
.proj-row-count { font-size: 12px; color: var(--muted); }
.progress-bar-bg {
  height: 6px;
  background: var(--card);
  border-radius: 99px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 99px;
  transition: width .4s ease;
}

.extra-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-top: 20px;
}
.extra-block h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; }
.extra-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 5px 0;
  font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.extra-item:last-child { border-bottom: none; }
.extra-proj { color: var(--gold-dim); font-weight: 600; min-width: 120px; }

/* ── Dynamics ────────────────────────────────────────────────────────── */
.dyn-filters {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
}
.filter-btn.active { background: var(--gold); border-color: var(--gold); color: #0f172a; font-weight: 600; }
.filter-btn:hover:not(.active) { border-color: var(--gold-dim); color: var(--gold-dim); }

.chart-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
  overflow-x: auto;
}
.chart-title { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  text-align: center;
}
.stat-card-val { font-size: 28px; font-weight: 800; color: var(--gold); }
.stat-card-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

.heatmap-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  overflow-x: auto;
}
.heatmap-title { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

/* ── Modal (settings) ────────────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  width: 480px;
  max-width: 95vw;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h2 { font-size: 16px; margin-bottom: 18px; }
.modal-proj-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.modal-proj-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
}
.modal-proj-row input {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div>
    <div class="header-brand">DE COSTA GROUP</div>
    <div class="header-sub">Система тижневої звітності</div>
  </div>
</header>

<!-- Tabs -->
<nav class="tabs">
  <button class="tab-btn active" data-tab="report">📋 Звіт</button>
  <button class="tab-btn" data-tab="dashboard">📊 Дашборд</button>
  <button class="tab-btn" data-tab="dynamics">📈 Динаміка</button>
</nav>

<!-- ═══════════════════════ TAB: ЗВІТ ═══════════════════════ -->
<div id="report" class="tab-content active">

  <div class="week-nav">
    <button id="prevWeek" title="Попередній тиждень">‹</button>
    <div>
      <span class="week-label" id="weekLabel">—</span>
      <span class="week-sub" id="weekSub"></span>
    </div>
    <button id="nextWeek" title="Наступний тиждень">›</button>
    <span class="save-indicator" id="saveIndicator">●</span>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="exportDocx()">⬇ Завантажити DOCX</button>
    <button class="btn btn-ghost" onclick="openSettings()">⚙ Налаштування</button>
  </div>

  <div id="projectCards"></div>
</div>

<!-- ═══════════════════════ TAB: ДАШБОРД ═══════════════════════ -->
<div id="dashboard" class="tab-content">
  <div class="dash-top">
    <div class="donut-wrap">
      <div class="donut-title">Виконано за тиждень</div>
      <svg id="donutSvg" width="140" height="140" viewBox="0 0 140 140"></svg>
      <div class="donut-pct" id="donutPct">—</div>
      <div class="donut-sub" id="donutSub">завдань</div>
    </div>
    <div class="summary-card" id="summaryCard"></div>
  </div>
  <div class="proj-list" id="dashProjList"></div>
  <div class="extra-block" id="dashExtra" style="display:none">
    <h3>Позаплан</h3>
    <div id="dashExtraList"></div>
  </div>
</div>

<!-- ═══════════════════════ TAB: ДИНАМІКА ═══════════════════════ -->
<div id="dynamics" class="tab-content">
  <div class="dyn-filters">
    <button class="filter-btn" data-n="4">Місяць</button>
    <button class="filter-btn active" data-n="12">Квартал</button>
    <button class="filter-btn" data-n="26">Пів-року</button>
  </div>

  <div class="stats-grid" id="dynStats"></div>

  <div class="chart-wrap">
    <div class="chart-title">% виконання по тижнях</div>
    <svg id="barChart" width="100%" style="display:block"></svg>
  </div>

  <div class="heatmap-wrap">
    <div class="heatmap-title">Прогрес по проектах (тиждень × проект)</div>
    <svg id="heatmapSvg" style="display:block; overflow: visible;"></svg>
  </div>
</div>

<!-- ═══════════════════════ MODAL: Налаштування ═══════════════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeSettingsOutside(event)">
  <div class="modal">
    <h2>⚙ Список проектів</h2>
    <div class="modal-proj-list" id="modalProjList"></div>
    <button class="btn btn-ghost" onclick="addProjectRow()" style="width:100%;margin-bottom:8px">+ Додати проект</button>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeSettings()">Скасувати</button>
      <button class="btn btn-primary" onclick="saveProjects()">Зберегти</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════
let currentWeek = '';   // '2026-W12'
let weekData    = {};   // {iso_week, week_start, week_end, entries: {}}
let projects    = [];   // ['Ходосовка', ...]
let saveTimer   = null;

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════
async function init() {
  // Поточний тиждень
  const res = await fetch('/api/current-week');
  const { iso_week } = await res.json();
  currentWeek = iso_week;

  // Проекти
  await loadProjects();

  // Дані тижня
  await loadWeek(currentWeek);

  // Рендер
  renderReport();
  updateTabLabel();
}

// ══════════════════════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════════════════════
async function loadProjects() {
  const res = await fetch('/api/projects');
  projects = await res.json();
}

async function loadWeek(isoWeek) {
  const res = await fetch(`/api/week/${isoWeek}`);
  weekData = await res.json();
  // is_new — службовий прапор від сервера, зберігається до обробки в nextWeek
}

async function saveWeek() {
  const indicator = document.getElementById('saveIndicator');
  indicator.textContent = '●';
  indicator.className = 'save-indicator';

  delete weekData.is_new;   // не зберігаємо службовий прапор у файл

  await fetch(`/api/week/${currentWeek}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(weekData)
  });

  indicator.textContent = '✓ Збережено';
  indicator.className = 'save-indicator saved';
  setTimeout(() => {
    indicator.textContent = '●';
    indicator.className = 'save-indicator';
  }, 2000);
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveWeek, 800);
}

// ══════════════════════════════════════════════════════════════════════════════
// WEEK NAVIGATION
// ══════════════════════════════════════════════════════════════════════════════
function parseIsoWeek(isoWeek) {
  const [yearStr, weekStr] = isoWeek.split('-W');
  return { year: parseInt(yearStr), week: parseInt(weekStr) };
}

function shiftWeek(isoWeek, delta) {
  const { year, week } = parseIsoWeek(isoWeek);
  // Знаходимо понеділок цього тижня і додаємо delta тижнів
  const monday = isoWeekToMonday(year, week);
  monday.setDate(monday.getDate() + delta * 7);
  const { y, w } = dateToIsoWeek(monday);
  return `${y}-W${String(w).padStart(2, '0')}`;
}

function isoWeekToMonday(year, week) {
  // ISO 8601: week 1 = тиждень з першим четвергом
  const jan4 = new Date(year, 0, 4);
  const jan4Day = jan4.getDay() || 7; // 1=Mon..7=Sun
  const monday = new Date(jan4);
  monday.setDate(jan4.getDate() - (jan4Day - 1) + (week - 1) * 7);
  return monday;
}

function dateToIsoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return { y: d.getUTCFullYear(), w: weekNo };
}

function weekLabel(isoWeek) {
  const { year, week } = parseIsoWeek(isoWeek);
  const monday = isoWeekToMonday(year, week);
  const friday = new Date(monday); friday.setDate(monday.getDate() + 4);
  const fmt = d => `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}`;
  return `${fmt(monday)} – ${fmt(friday)}.${friday.getFullYear()}`;
}

function updateTabLabel() {
  document.getElementById('weekLabel').textContent = `Тиждень ${parseIsoWeek(currentWeek).week}`;
  document.getElementById('weekSub').textContent = weekLabel(currentWeek);
}

document.getElementById('prevWeek').addEventListener('click', async () => {
  currentWeek = shiftWeek(currentWeek, -1);
  await loadWeek(currentWeek);
  renderReport();
  updateTabLabel();
  if (document.getElementById('dashboard').classList.contains('active')) renderDashboard();
});
document.getElementById('nextWeek').addEventListener('click', async () => {
  const prevWeekData = weekData;   // зберігаємо поточний тиждень до переходу
  currentWeek = shiftWeek(currentWeek, +1);
  await loadWeek(currentWeek);
  if (weekData.is_new) {
    delete weekData.is_new;
    carryOverFromWeek(prevWeekData);
    scheduleSave();
  }
  renderReport();
  updateTabLabel();
  if (document.getElementById('dashboard').classList.contains('active')) renderDashboard();
});

// ══════════════════════════════════════════════════════════════════════════════
// REPORT TAB
// ══════════════════════════════════════════════════════════════════════════════
function getEntry(proj) {
  if (!weekData.entries) weekData.entries = {};
  if (!weekData.entries[proj]) weekData.entries[proj] = { plan: [], done: [], extra: [], cancelled: [], comments: {} };
  const e = weekData.entries[proj];
  if (!e.cancelled) e.cancelled = [];
  if (!e.comments)  e.comments  = {};
  return e;
}

function pctColor(pct) {
  if (pct >= 75) return 'var(--green)';
  if (pct >= 40) return 'var(--orange)';
  return 'var(--red)';
}

function badgeClass(pct, hasplan) {
  if (!hasplan) return 'badge-empty';
  if (pct >= 75) return 'badge-green';
  if (pct >= 40) return 'badge-orange';
  return 'badge-red';
}

function renderReport() {
  const container = document.getElementById('projectCards');
  container.innerHTML = '';

  projects.forEach(proj => {
    const entry = getEntry(proj);
    const cancelled = entry.cancelled || [];
    const planN = entry.plan.filter(t => !cancelled.includes(t)).length;
    const doneN = entry.plan.filter(t => !cancelled.includes(t) && entry.done.includes(t)).length;
    const extraN = entry.extra.length;
    const pct = planN > 0 ? Math.round(doneN / planN * 100) : 0;

    const card = document.createElement('div');
    card.className = 'project-card';
    card.dataset.proj = proj;

    // Badge text
    let badgeTxt = planN > 0 ? `${doneN}/${planN}` : 'Немає задач';
    if (extraN > 0) badgeTxt += ` +${extraN}`;

    card.innerHTML = `
      <div class="project-header" onclick="toggleCard(this)">
        <span class="project-chevron">▶</span>
        <span class="project-name">${proj}</span>
        <span class="project-badge ${badgeClass(pct, planN > 0)}">${badgeTxt}</span>
      </div>
      <div class="project-body">
        <div class="section-label">ПЛАН</div>
        <div class="plan-tasks" data-proj="${proj}">
          ${entry.plan.map(t => renderPlanTask(proj, t, entry.done.includes(t), (entry.cancelled||[]).includes(t))).join('')}
        </div>
        <button class="add-task-btn" onclick="addTask('${proj}', 'plan')">+ Додати завдання</button>

        <div class="section-label">ПОЗАПЛАН</div>
        <div class="extra-tasks" data-proj="${proj}">
          ${entry.extra.map(t => renderExtraTask(proj, t)).join('')}
        </div>
        <button class="add-task-btn" onclick="addTask('${proj}', 'extra')">+ Додати позапланове</button>
      </div>
    `;
    container.appendChild(card);
  });
  // Авто-розмір для заповнених полів коментарів
  document.querySelectorAll('#projectCards .task-comment').forEach(autoResize);
}

function renderPlanTask(proj, task, isDone, isCancelled) {
  const ep = proj.replace(/'/g, "\\'");
  const et = task.replace(/'/g, "\\'").replace(/"/g, '&quot;');
  if (isCancelled) {
    return `<div class="task-row">
      <span class="task-cancelled-icon">⊘</span>
      <span class="task-text-cancelled">${task}</span>
      <button class="task-restore-btn" onclick="toggleCancelled('${ep}','${et}')" title="Відновити задачу">↩</button>
      <button class="task-delete" onclick="deleteTask('${ep}','plan','${et}')">×</button>
    </div>`;
  }
  const entry = getEntry(proj);
  const comment = (entry.comments || {})[task] || '';
  return `<div class="task-row">
    <input type="checkbox" class="task-check" ${isDone ? 'checked' : ''}
      onchange="toggleDone('${ep}','${et}',this.checked)">
    <textarea class="task-text ${isDone ? 'done-text' : ''}" rows="1"
      onblur="updateTask('${ep}','plan','${et}',this.value)"
      oninput="autoResize(this)">${task}</textarea>
    <button class="task-cancel-btn" onclick="toggleCancelled('${ep}','${et}')" title="Скасувати задачу">⊘</button>
    <button class="task-delete" onclick="deleteTask('${ep}','plan','${et}')">×</button>
    <div class="task-comment-wrap ${isDone ? 'visible' : ''}">
      <textarea class="task-comment" rows="1" placeholder="Коментар до виконання..."
        onblur="saveComment('${ep}','${et}',this.value)"
        oninput="autoResize(this)">${comment}</textarea>
    </div>
  </div>`;
}

function renderExtraTask(proj, task) {
  const escapedTask = task.replace(/'/g, "\\'").replace(/"/g, '&quot;');
  return `<div class="task-row">
    <span style="color:var(--gold);font-size:14px;margin-top:2px">★</span>
    <textarea class="task-text" rows="1"
      onblur="updateTask('${proj}', 'extra', '${escapedTask}', this.value)"
      oninput="autoResize(this)">${task}</textarea>
    <button class="task-delete" onclick="deleteTask('${proj}', 'extra', '${escapedTask}')">×</button>
  </div>`;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function toggleCard(header) {
  header.parentElement.classList.toggle('open');
}

function toggleDone(proj, task, checked) {
  const entry = getEntry(proj);
  if (checked) {
    if (!entry.done.includes(task)) entry.done.push(task);
  } else {
    entry.done = entry.done.filter(t => t !== task);
    delete entry.comments[task];
  }
  const card = document.querySelector(`.project-card[data-proj="${proj}"]`);
  if (card) {
    card.querySelectorAll('.plan-tasks .task-row').forEach(row => {
      const ta = row.querySelector('.task-text');
      if (!ta || ta.value !== task) return;
      ta.className = `task-text ${checked ? 'done-text' : ''}`;
      const wrap = row.querySelector('.task-comment-wrap');
      if (wrap) {
        wrap.classList.toggle('visible', checked);
        if (checked) setTimeout(() => wrap.querySelector('.task-comment')?.focus(), 50);
      }
    });
    updateBadge(proj);
  }
  scheduleSave();
}

function saveComment(proj, task, value) {
  const entry = getEntry(proj);
  value = value.trim();
  if (value) entry.comments[task] = value;
  else delete entry.comments[task];
  scheduleSave();
}

function toggleCancelled(proj, task) {
  const entry = getEntry(proj);
  const idx = entry.cancelled.indexOf(task);
  if (idx >= 0) {
    entry.cancelled.splice(idx, 1);           // відновити
  } else {
    entry.cancelled.push(task);               // скасувати
    entry.done = entry.done.filter(t => t !== task);
    delete entry.comments[task];
  }
  const card = document.querySelector(`.project-card[data-proj="${proj}"]`);
  if (card) {
    const container = card.querySelector('.plan-tasks');
    container.innerHTML = entry.plan
      .map(t => renderPlanTask(proj, t, entry.done.includes(t), entry.cancelled.includes(t)))
      .join('');
    updateBadge(proj);
  }
  scheduleSave();
}

function updateTask(proj, type, oldTask, newTask) {
  newTask = newTask.trim();
  if (!newTask || newTask === oldTask) return;
  const entry = getEntry(proj);
  const arr = entry[type];
  const idx = arr.indexOf(oldTask);
  if (idx >= 0) arr[idx] = newTask;
  if (type === 'plan') {
    const doneIdx = entry.done.indexOf(oldTask);
    if (doneIdx >= 0) entry.done[doneIdx] = newTask;
  }
  scheduleSave();
}

function deleteTask(proj, type, task) {
  const entry = getEntry(proj);
  entry[type] = entry[type].filter(t => t !== task);
  if (type === 'plan') {
    entry.done      = entry.done.filter(t => t !== task);
    entry.cancelled = entry.cancelled.filter(t => t !== task);
    delete entry.comments[task];
  }
  const card = document.querySelector(`.project-card[data-proj="${proj}"]`);
  const container = type === 'plan'
    ? card.querySelector('.plan-tasks')
    : card.querySelector('.extra-tasks');
  const renderFn = type === 'plan'
    ? t => renderPlanTask(proj, t, entry.done.includes(t), entry.cancelled.includes(t))
    : t => renderExtraTask(proj, t);
  container.innerHTML = entry[type].map(renderFn).join('');
  updateBadge(proj);
  scheduleSave();
}

function addTask(proj, type) {
  const entry = getEntry(proj);
  const placeholder = type === 'plan' ? 'Нове завдання...' : 'Позапланова задача...';
  const card = document.querySelector(`.project-card[data-proj="${proj}"]`);
  const container = type === 'plan'
    ? card.querySelector('.plan-tasks')
    : card.querySelector('.extra-tasks');

  const row = document.createElement('div');
  row.className = 'task-row';
  if (type === 'plan') {
    row.innerHTML = `
      <input type="checkbox" class="task-check" disabled>
      <textarea class="task-text" rows="1" placeholder="${placeholder}"
        oninput="autoResize(this)"></textarea>
      <button class="task-delete">×</button>`;
  } else {
    row.innerHTML = `
      <span style="color:var(--gold);font-size:14px;margin-top:2px">★</span>
      <textarea class="task-text" rows="1" placeholder="${placeholder}"
        oninput="autoResize(this)"></textarea>
      <button class="task-delete">×</button>`;
  }
  container.appendChild(row);

  const textarea = row.querySelector('textarea');
  textarea.focus();

  textarea.addEventListener('blur', () => {
    const val = textarea.value.trim();
    if (!val) { row.remove(); return; }
    entry[type].push(val);
    const renderFn = type === 'plan'
      ? t => renderPlanTask(proj, t, entry.done.includes(t), entry.cancelled.includes(t))
      : t => renderExtraTask(proj, t);
    container.innerHTML = entry[type].map(renderFn).join('');
    updateBadge(proj);
    scheduleSave();
  });

  row.querySelector('.task-delete').addEventListener('click', () => row.remove());
}

function updateBadge(proj) {
  const entry = getEntry(proj);
  const cancelled = entry.cancelled || [];
  const planN = entry.plan.filter(t => !cancelled.includes(t)).length;
  const doneN = entry.plan.filter(t => !cancelled.includes(t) && entry.done.includes(t)).length;
  const extraN = entry.extra.length;
  const pct = planN > 0 ? Math.round(doneN / planN * 100) : 0;
  const card = document.querySelector(`.project-card[data-proj="${proj}"]`);
  if (!card) return;
  const badge = card.querySelector('.project-badge');
  badge.className = `project-badge ${badgeClass(pct, planN > 0)}`;
  let txt = planN > 0 ? `${doneN}/${planN}` : 'Немає задач';
  if (extraN > 0) txt += ` +${extraN}`;
  badge.textContent = txt;
}

// Перенос невиконаних (не done, не cancelled) задач з попереднього тижня
function carryOverFromWeek(prevData) {
  const prevEntries = prevData.entries || {};
  projects.forEach(proj => {
    const prev = prevEntries[proj];
    if (!prev || !prev.plan || prev.plan.length === 0) return;
    const cancelled = new Set(prev.cancelled || []);
    const done = new Set(prev.done || []);
    const undone = prev.plan.filter(t => !cancelled.has(t) && !done.has(t));
    if (undone.length === 0) return;
    const entry = getEntry(proj);
    undone.forEach(t => { if (!entry.plan.includes(t)) entry.plan.push(t); });
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// DASHBOARD TAB
// ══════════════════════════════════════════════════════════════════════════════
function renderDashboard() {
  const entries = weekData.entries || {};
  let totalPlan = 0, totalDone = 0;

  const projStats = projects.map(proj => {
    const entry = entries[proj] || { plan: [], done: [], extra: [], cancelled: [] };
    const cancelled = entry.cancelled || [];
    const planN = entry.plan.filter(t => !cancelled.includes(t)).length;
    const doneN = entry.plan.filter(t => !cancelled.includes(t) && entry.done.includes(t)).length;
    const extraN = entry.extra.length;
    totalPlan += planN;
    totalDone += doneN;
    return { proj, planN, doneN, extraN, pct: planN > 0 ? Math.round(doneN / planN * 100) : null };
  });

  const overallPct = totalPlan > 0 ? Math.round(totalDone / totalPlan * 100) : 0;

  // Donut
  drawDonut(overallPct);
  document.getElementById('donutPct').textContent = totalPlan > 0 ? `${overallPct}%` : '—';
  document.getElementById('donutSub').textContent = `${totalDone} з ${totalPlan} завдань`;

  // Summary card
  const inProgress = projStats.filter(p => p.planN > 0 && p.doneN < p.planN).length;
  const done100 = projStats.filter(p => p.planN > 0 && p.doneN === p.planN).length;
  const noTasks = projStats.filter(p => p.planN === 0).length;
  document.getElementById('summaryCard').innerHTML = `
    <div class="summary-stat"><span class="summary-stat-val" style="color:var(--green)">${done100}</span><span class="summary-stat-lbl">проектів виконано повністю</span></div>
    <div class="summary-stat"><span class="summary-stat-val" style="color:var(--orange)">${inProgress}</span><span class="summary-stat-lbl">проектів у процесі</span></div>
    <div class="summary-stat"><span class="summary-stat-val" style="color:var(--muted)">${noTasks}</span><span class="summary-stat-lbl">проектів без задач</span></div>
  `;

  // Project list
  const list = document.getElementById('dashProjList');
  list.innerHTML = projStats
    .filter(p => p.planN > 0)
    .sort((a, b) => (b.pct ?? -1) - (a.pct ?? -1))
    .map(({ proj, planN, doneN, pct }) => `
      <div class="proj-row">
        <div class="proj-row-top">
          <span class="proj-row-name">${proj}</span>
          <span class="proj-row-count" style="color:${pctColor(pct)}">${doneN}/${planN} (${pct}%)</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width:${pct}%;background:${pctColor(pct)}"></div>
        </div>
      </div>`)
    .join('');

  // Extra
  const extras = [];
  projStats.forEach(({ proj, extraN }) => {
    if (extraN === 0) return;
    const e = entries[proj];
    e.extra.forEach(t => extras.push({ proj, task: t }));
  });

  const extraBlock = document.getElementById('dashExtra');
  const extraList  = document.getElementById('dashExtraList');
  if (extras.length > 0) {
    extraBlock.style.display = '';
    extraList.innerHTML = extras.map(({ proj, task }) =>
      `<div class="extra-item"><span class="extra-proj">${proj}</span><span>${task}</span></div>`
    ).join('');
  } else {
    extraBlock.style.display = 'none';
  }
}

function drawDonut(pct) {
  const svg = document.getElementById('donutSvg');
  svg.innerHTML = '';
  const cx = 70, cy = 70, r = 52, sw = 14;
  const circ = 2 * Math.PI * r;
  const filled = circ * pct / 100;
  const color = pctColor(pct);

  const mkCircle = (cls, strokeDash, strokeOffset, stroke) => {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', r);
    c.setAttribute('fill', 'none');
    c.setAttribute('stroke', stroke);
    c.setAttribute('stroke-width', sw);
    c.setAttribute('stroke-dasharray', strokeDash);
    c.setAttribute('stroke-dashoffset', strokeOffset);
    c.setAttribute('transform', `rotate(-90 ${cx} ${cy})`);
    svg.appendChild(c);
  };

  mkCircle('bg', circ, 0, 'rgba(255,255,255,.07)');
  if (pct > 0) mkCircle('fg', `${filled} ${circ}`, 0, color);
}

// DYNAMICS TAB
// ══════════════════════════════════════════════════════════════════════════════
let dynN = 12;
let historyData = [];

async function loadAndRenderDynamics() {
  const res = await fetch(`/api/history?n=${dynN}`);
  historyData = await res.json();
  renderDynamics();
}

function renderDynamics() {
  const data = historyData;
  const hasData = data.filter(d => d.has_data);

  // Stats
  const avg = hasData.length > 0
    ? Math.round(hasData.reduce((s, d) => s + d.pct, 0) / hasData.length)
    : 0;
  const best = hasData.length > 0
    ? hasData.reduce((b, d) => d.pct > b.pct ? d : b, hasData[0])
    : null;

  document.getElementById('dynStats').innerHTML = `
    <div class="stat-card">
      <div class="stat-card-val">${avg}%</div>
      <div class="stat-card-lbl">Середній % виконання</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-val" style="color:var(--green)">${best ? best.pct + '%' : '—'}</div>
      <div class="stat-card-lbl">Найкращий тиждень${best ? '<br><span style="font-size:11px;color:var(--muted)">' + weekLabelShort(best.week_start, best.week_end) + '</span>' : ''}</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-val" style="color:var(--blue)">${hasData.length}</div>
      <div class="stat-card-lbl">Тижнів зі звітністю</div>
    </div>`;

  drawBarChart(data);
  drawHeatmap(data);
}

function weekLabelShort(start, end) {
  const fmt = s => s.slice(8, 10) + '.' + s.slice(5, 7);
  return fmt(start) + '–' + fmt(end);
}

function drawBarChart(data) {
  const svg = document.getElementById('barChart');
  const W = svg.parentElement.clientWidth - 40;
  const H = 220;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('height', H);
  svg.innerHTML = '';

  const pad = { top: 20, right: 10, bottom: 50, left: 40 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;
  const n = data.length;
  const barW = Math.max(8, Math.floor(plotW / n) - 4);

  const mk = (tag, attrs) => {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
    return el;
  };

  // Background
  svg.appendChild(mk('rect', { x: 0, y: 0, width: W, height: H, fill: 'transparent' }));

  // Grid lines
  [0, 25, 50, 75, 100].forEach(pct => {
    const y = pad.top + plotH - (pct / 100) * plotH;
    svg.appendChild(mk('line', { x1: pad.left, y1: y, x2: pad.left + plotW, y2: y,
      stroke: 'rgba(255,255,255,.06)', 'stroke-width': 1 }));
    const lbl = mk('text', { x: pad.left - 6, y: y + 4,
      'text-anchor': 'end', fill: '#64748b', 'font-size': 10 });
    lbl.textContent = pct + '%';
    svg.appendChild(lbl);
  });

  data.forEach((d, i) => {
    const x = pad.left + (i / n) * plotW + (plotW / n - barW) / 2;
    const pct = d.pct;
    const barH = d.has_data ? Math.max(2, (pct / 100) * plotH) : 0;
    const y = pad.top + plotH - barH;
    const color = d.has_data ? pctColor(pct) : 'rgba(255,255,255,.08)';

    // Bar
    const bar = mk('rect', { x, y, width: barW, height: barH,
      fill: color, rx: 3, opacity: d.has_data ? 1 : 0.4 });
    svg.appendChild(bar);

    // Value label
    if (d.has_data && pct > 0) {
      const lbl = mk('text', { x: x + barW / 2, y: y - 4,
        'text-anchor': 'middle', fill: '#f1f5f9', 'font-size': 10, 'font-weight': 600 });
      lbl.textContent = pct + '%';
      svg.appendChild(lbl);
    }

    // X-axis label
    const xLabel = mk('text', { x: x + barW / 2, y: H - pad.bottom + 14,
      'text-anchor': 'middle', fill: '#64748b', 'font-size': 9 });
    xLabel.textContent = weekLabelShort(d.week_start, d.week_end);
    svg.appendChild(xLabel);
  });
}

function drawHeatmap(data) {
  const svg = document.getElementById('heatmapSvg');
  svg.innerHTML = '';
  if (!data.length) return;

  const cellW = 40, cellH = 22, gap = 3;
  const labelW = 160;
  const topH = 38;

  // Collect all projects
  const projSet = new Set(projects);
  data.forEach(d => Object.keys(d.projects || {}).forEach(p => projSet.add(p)));
  const projs = Array.from(projSet);

  const W = labelW + data.length * (cellW + gap);
  const H = topH + projs.length * (cellH + gap);

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);

  const mk = (tag, attrs, text) => {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
    if (text !== undefined) el.textContent = text;
    return el;
  };

  // Week headers
  data.forEach((d, i) => {
    const x = labelW + i * (cellW + gap) + cellW / 2;
    const lbl = mk('text', { x, y: topH - 6, 'text-anchor': 'middle', fill: '#64748b', 'font-size': 9 });
    lbl.textContent = weekLabelShort(d.week_start, d.week_end);
    svg.appendChild(lbl);
  });

  // Rows
  projs.forEach((proj, row) => {
    const y = topH + row * (cellH + gap);

    // Project label
    const lbl = mk('text', { x: labelW - 8, y: y + cellH / 2 + 4,
      'text-anchor': 'end', fill: '#94a3b8', 'font-size': 11 });
    lbl.textContent = proj.length > 22 ? proj.slice(0, 20) + '…' : proj;
    svg.appendChild(lbl);

    // Cells
    data.forEach((d, col) => {
      const x = labelW + col * (cellW + gap);
      const projData = d.projects?.[proj];
      let color = 'rgba(255,255,255,.05)';
      let pct = null;
      if (projData && projData.plan > 0) {
        pct = projData.pct;
        const alpha = 0.15 + (pct / 100) * 0.85;
        if (pct >= 75) color = `rgba(34,197,94,${alpha.toFixed(2)})`;
        else if (pct >= 40) color = `rgba(245,158,11,${alpha.toFixed(2)})`;
        else color = `rgba(239,68,68,${alpha.toFixed(2)})`;
      }
      svg.appendChild(mk('rect', { x, y, width: cellW, height: cellH, fill: color, rx: 3 }));
      if (pct !== null) {
        svg.appendChild(mk('text', { x: x + cellW / 2, y: y + cellH / 2 + 4,
          'text-anchor': 'middle', fill: '#fff', 'font-size': 9, 'font-weight': 600 },
          pct + '%'));
      }
    });
  });
}

  document.getElementById('modalOverlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeSettingsOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeSettings();
}

function addProjectRow() {
  const list = document.getElementById('modalProjList');
  const row = document.createElement('div');
  row.className = 'modal-proj-row';
  row.innerHTML = `<input type="text" placeholder="Назва проекту">
    <button class="task-delete" onclick="removeProjectRow(this)">×</button>`;
  list.appendChild(row);
  row.querySelector('input').focus();
}

function removeProjectRow(btn) {
  btn.closest('.modal-proj-row').remove();
}

async function saveProjects() {
  const inputs = document.querySelectorAll('#modalProjList input');
  const newProjects = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
  await fetch('/api/projects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(newProjects)
  });
  projects = newProjects;
  closeSettings();
  renderReport();
}

// ══════════════════════════════════════════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════════════════════════════════════════
async function exportDocx() {
  // Спочатку зберегти
  await saveWeek();
  const a = document.createElement('a');
  a.href = `/api/export/${currentWeek}`;
  a.click();
}

// ══════════════════════════════════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById(tab).classList.add('active');

    if (tab === 'dashboard') renderDashboard();
    if (tab === 'dynamics') await loadAndRenderDynamics();
  });
});

// ══════════════════════════════════════════════════════════════════════════════
// FILTER BUTTONS (dynamics)
// ══════════════════════════════════════════════════════════════════════════════
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    dynN = parseInt(btn.dataset.n);
    await loadAndRenderDynamics();
  });
});

// ══════════════════════════════════════════════════════════════════════════════
// START
// ══════════════════════════════════════════════════════════════════════════════
init();
</script>
